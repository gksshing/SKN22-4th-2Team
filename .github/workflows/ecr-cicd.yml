# =============================================================================
# 쇼특허(Short-Cut) – ECR 빌드/푸시 CI/CD 파이프라인
# =============================================================================
# 트리거:
#   - develop 브랜치 push → short-cut-api-prod ECR에 이미지 빌드/푸시
#                           + ECS_SERVICE_PROD Secret이 설정된 경우 ECS 서비스 자동 업데이트
#   - v* 태그 push       → develop과 동일한 production 배포 (시맨틱 버전 태그 추가)
#
# 인증 방식: OIDC (AWS Access Key 없이 임시 크레덴셜 사용)
# 캐시 전략: GitHub Cache API (type=gha) 기반 레이어 캐싱
# =============================================================================

name: ECR 이미지 빌드 및 푸시

on:
  push:
    branches:
      - develop # production 환경 배포 (main 대용)
    tags:
      - "v*" # 시맨틱 버전 태그 (예: v1.0.0) → production 배포

# GitHub Actions OIDC 토큰 발급에 필요한 권한
permissions:
  id-token: write # OIDC JWT 토큰 발급
  contents: read # 코드 체크아웃

env:
  # AWS 설정 (GitHub Secrets에서 주입)
  AWS_REGION: ${{ secrets.AWS_REGION }}
  AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # JOB 1: develop 브랜치 → staging ECR 빌드/푸시
  # ────────────────────────────────────────────────────────────────────────────
  build-and-push-staging:
    name: "🚀 Staging 빌드/푸시 (develop)"
    runs-on: ubuntu-latest
    # 이 JOB은 비활성화하거나 staging이 필요한 경우에만 사용합니다.
    # 현재는 develop이 배포용이므로 production JOB에서 수행합니다.
    if: false && github.ref == 'refs/heads/develop' && github.event_name == 'push'

    outputs:
      image-tag: ${{ steps.info.outputs.sha-tag }}

    steps:
      # ── 1. 소스 코드 체크아웃 ─────────────────────────────────────────────
      - name: 소스 코드 체크아웃
        uses: actions/checkout@v4

      # ── 2. OIDC 기반 AWS 인증 (키 없음) ──────────────────────────────────
      - name: AWS 인증 (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-oidc-role
          aws-region: ${{ secrets.AWS_REGION }}
          # 최대 세션 시간: 1시간 (대형 빌드 대비)
          role-session-name: GitHubActions-Staging-${{ github.run_id }}

      # ── 3. ECR 로그인 ─────────────────────────────────────────────────────
      - name: Amazon ECR 로그인
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ── 4. Docker Buildx 설정 (레이어 캐시 지원) ──────────────────────────
      - name: Docker Buildx 설정
        uses: docker/setup-buildx-action@v3

      # ── 5. 기본 정보 설정 ────────────────────────────────────────────────
      - name: 레지스트리 정보 설정
        id: info
        run: |
          SHA_TAG=$(echo "${{ github.sha }}" | cut -c1-7)
          ECR_REGISTRY="${{ steps.login-ecr.outputs.registry }}"
          ECR_REPO="${{ secrets.ECR_REPO_STAGING }}"
          echo "sha-tag=${SHA_TAG}" >> $GITHUB_OUTPUT
          echo "image-uri=${ECR_REGISTRY}/${ECR_REPO}" >> $GITHUB_OUTPUT

      # ── 6. Docker Meta 추출 ──────────────────────────────────────────────
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.info.outputs.image-uri }}
          tags: |
            type=sha,format=short,prefix=
            type=raw,value=staging-latest
            type=ref,event=branch

      # ── 7. 빌드 및 푸시 (레이어 캐시 최적화 적용) ───────────────────────────
      - name: Docker 이미지 빌드 및 ECR 푸시 (Staging)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GitHub Cache API 레이어 캐싱 (scope 지정으로 병렬 충돌 방지)
          cache-from: type=gha,scope=${{ github.workflow }}-${{ github.ref_name }}
          cache-to: type=gha,mode=max,scope=${{ github.workflow }}-${{ github.ref_name }}
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            GIT_COMMIT=${{ github.sha }}
            GIT_BRANCH=${{ github.ref_name }}

      # ── 8. 빌드 결과 요약 출력 ────────────────────────────────────────────
      - name: 빌드 결과 요약
        run: |
          TAGS=$(echo "${{ steps.meta.outputs.tags }}" | tr '\n' ', ')
          echo "## 🐳 Staging 이미지 푸시 완료" >> $GITHUB_STEP_SUMMARY
          echo "| 항목 | 값 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| 커밋 SHA | \`${{ steps.info.outputs.sha-tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 이미지 태그 | \`${TAGS}\` |" >> $GITHUB_STEP_SUMMARY

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 2: main 브랜치 / v* 태그 → production ECR 빌드/푸시 + ECS 배포
  # ────────────────────────────────────────────────────────────────────────────
  build-and-push-production:
    name: "🚀 Production 빌드/푸시 (develop / v*)"
    runs-on: ubuntu-latest
    # develop 브랜치 푸시 또는 v* 태그 푸시일 때만 실행
    if: >
      (github.ref == 'refs/heads/develop' && github.event_name == 'push') ||
      (startsWith(github.ref, 'refs/tags/v') && github.event_name == 'push')

    outputs:
      image-tag: ${{ steps.info.outputs.sha-tag }}
      ecs-deploy-enabled: ${{ steps.check-ecs.outputs.enabled }}

    steps:
      # ── 1. 소스 코드 체크아웃 ─────────────────────────────────────────────
      - name: 소스 코드 체크아웃
        uses: actions/checkout@v4

      # ── 2. OIDC 기반 AWS 인증 ─────────────────────────────────────────────
      - name: AWS 인증 (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-oidc-role
          aws-region: ${{ secrets.AWS_REGION }}
          role-session-name: GitHubActions-Prod-${{ github.run_id }}

      # ── 3. ECR 로그인 ─────────────────────────────────────────────────────
      - name: Amazon ECR 로그인
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ── 4. Docker Buildx 설정 ─────────────────────────────────────────────
      - name: Docker Buildx 설정
        uses: docker/setup-buildx-action@v3

      # ── 5. 기본 정보 설정 ────────────────────────────────────────────────
      - name: 레지스트리 정보 설정
        id: info
        run: |
          SHA_TAG=$(echo "${{ github.sha }}" | cut -c1-7)
          ECR_REGISTRY="${{ steps.login-ecr.outputs.registry }}"
          ECR_REPO="${{ secrets.ECR_REPO_PROD }}"
          echo "sha-tag=${SHA_TAG}" >> $GITHUB_OUTPUT
          echo "image-uri=${ECR_REGISTRY}/${ECR_REPO}" >> $GITHUB_OUTPUT

      # ── 6. Docker Meta 추출 ──────────────────────────────────────────────
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.info.outputs.image-uri }}
          tags: |
            type=sha,format=short,prefix=
            type=raw,value=latest
            type=ref,event=branch
            type=semver,pattern={{version}}

      # ── 7. 빌드 및 ECR 푸시 (레이어 캐시 최적화 적용) ────────────────────────
      - name: Docker 이미지 빌드 및 ECR 푸시 (Production)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GHA 캐시 제거: 소스 변경이 캐시에 의해 무시되는 문제 방지
          # cache-from/cache-to 없이 매번 전체 레이어 재빌드
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            GIT_COMMIT=${{ github.sha }}
            GIT_BRANCH=${{ github.ref_name }}

      # ── 8. 빌드 결과 요약 ─────────────────────────────────────────────────
      - name: 빌드 결과 요약
        run: |
          TAGS=$(echo "${{ steps.meta.outputs.tags }}" | tr '\n' ', ')
          echo "## 🐳 Production 이미지 푸시 완료" >> $GITHUB_STEP_SUMMARY
          echo "| 항목 | 값 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| 커밋 SHA | \`${{ steps.info.outputs.sha-tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 이미지 태그 | \`${TAGS}\` |" >> $GITHUB_STEP_SUMMARY

      # ── 8. ECS 배포 가능 여부 확인 (Secret 존재 검사) ────────────────────────
      - name: ECS 배포 활성화 상태 세팅
        id: check-ecs
        run: |
          echo "enabled=true" >> $GITHUB_OUTPUT
          echo "[CI] ECS 배포 활성화: 서비스 이름 하드코딩 적용됨"

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 3: ECS 서비스 업데이트 (Production 이미지 푸시 완료 후)
  # ECS_SERVICE_PROD Secret이 설정된 경우에만 실행됩니다.
  # ────────────────────────────────────────────────────────────────────────────
  deploy-ecs-production:
    name: "🏗️ ECS 서비스 업데이트 (Production)"
    runs-on: ubuntu-latest
    # production 빌드가 성공한 후에만 실행
    needs: build-and-push-production
    if: needs.build-and-push-production.result == 'success'

    steps:
      # ── 1. AWS 인증 ───────────────────────────────────────────────────────
      - name: AWS 인증 (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-oidc-role
          aws-region: ${{ secrets.AWS_REGION }}
          role-session-name: GitHubActions-ECS-Deploy-${{ github.run_id }}

      # ── 2. ECR 로그인 ─────────────────────────────────────────────────────
      - name: Amazon ECR 로그인
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ── 3. ECS Task Definition 새 리비전 등록 ─────────────────────────────
      - name: 소스 코드 체크아웃 (task-definition 파일 필요)
        uses: actions/checkout@v4

      - name: Task Definition 내 AWS Account ID 동적 치환
        run: |
          sed -i 's/<AWS_ACCOUNT_ID>/${{ secrets.AWS_ACCOUNT_ID }}/g' infra/ecs/task-definition-template.json

      # 소셜 로그인 제거됨 — 환경변수 주입 단계 불필요

      - name: ECS Task Definition 이미지 URI 업데이트
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          # infra/ecs/task-definition-template.json을 기반으로 이미지만 교체
          task-definition: infra/ecs/task-definition-template.json
          container-name: short-cut-api
          image: ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPO_PROD }}:${{ needs.build-and-push-production.outputs.image-tag }}

      # ── 4. ECS 서비스 배포 ────────────────────────────────────────────────
      - name: ECS 서비스에 새 Task Definition 배포
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ secrets.ECS_SERVICE_PROD }}
          cluster: ${{ secrets.ECS_CLUSTER_PROD }}
          wait-for-service-stability: false

      # ── 5. 배포 결과 요약 ─────────────────────────────────────────────────
      - name: 배포 결과 요약
        run: |
          echo "## 🚀 ECS Production 배포 완료" >> $GITHUB_STEP_SUMMARY
          echo "| 항목 | 값 |" >> $GITHUB_STEP_SUMMARY
          echo "| 클러스터 | \`${{ secrets.ECS_CLUSTER_PROD }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 서비스 | \`${{ secrets.ECS_SERVICE_PROD }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| ALB URL | \`short-cut-alb-183482512.ap-northeast-2.elb.amazonaws.com\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 배포 이미지 | \`${{ needs.build-and-push-production.outputs.image-tag }}\` |" >> $GITHUB_STEP_SUMMARY
